# Job: runs the four gold load-strategy scripts in sequence/parallel.
# Uses serverless compute (no job_clusters defined).
# Deploy with the 'serverless' CLI authentication profile:
#   databricks bundle deploy -t serverless --profile serverless
#   databricks bundle run gold_strategies -t serverless --profile serverless
#
# Task execution order:
#   1. setup_source_table   — creates production_source (idempotent)
#   2. simulate_changes     — applies DELETEs / UPDATEs / INSERTs
#   3–6. (parallel) gold_full_refresh, gold_incremental,
#                            gold_cdc, gold_no_delete
resources:
  jobs:
    gold_strategies:
      name: "[${bundle.target}] Gold Table Load Strategies"
      description: >
        Demonstrates four pure-PySpark gold load strategies:
        full overwrite, watermark-based incremental append,
        CDC MERGE, and CDC no-delete append.
        Source: {catalog}.gold_dev.production_source (Delta CDF enabled).
      # Serverless: omit job_clusters so tasks use serverless compute.
      environments:
        - environment_key: gold_env
          spec:
            environment_version: "1"

      tasks:
        # ------------------------------------------------------------------ #
        # Task 1 — Create / verify production_source                          #
        # ------------------------------------------------------------------ #
        - task_key: setup_source_table
          environment_key: gold_env
          notebook_task:
            notebook_path: ../pyspark_examples/gold_strategies/setup_source_table.py
            base_parameters:
              catalog: "${var.catalog}"
              schema_silver: "${var.schema_silver}"
              schema_gold: "${var.schema_gold}"

        # ------------------------------------------------------------------ #
        # Task 2 — Simulate DELETEs, UPDATEs, INSERTs                        #
        # ------------------------------------------------------------------ #
        - task_key: simulate_changes
          depends_on:
            - task_key: setup_source_table
          environment_key: gold_env
          notebook_task:
            notebook_path: ../pyspark_examples/gold_strategies/simulate_changes.py
            base_parameters:
              catalog: "${var.catalog}"
              schema_gold: "${var.schema_gold}"

        # ------------------------------------------------------------------ #
        # Tasks 3–6 — Gold strategies (run in parallel after simulate_changes)#
        # ------------------------------------------------------------------ #
        - task_key: gold_full_refresh
          depends_on:
            - task_key: simulate_changes
          environment_key: gold_env
          notebook_task:
            notebook_path: ../pyspark_examples/gold_strategies/gold_full_refresh.py
            base_parameters:
              catalog: "${var.catalog}"
              schema_gold: "${var.schema_gold}"

        - task_key: gold_incremental
          depends_on:
            - task_key: simulate_changes
          environment_key: gold_env
          notebook_task:
            notebook_path: ../pyspark_examples/gold_strategies/gold_incremental.py
            base_parameters:
              catalog: "${var.catalog}"
              schema_gold: "${var.schema_gold}"

        - task_key: gold_cdc
          depends_on:
            - task_key: simulate_changes
          environment_key: gold_env
          notebook_task:
            notebook_path: ../pyspark_examples/gold_strategies/gold_cdc.py
            base_parameters:
              catalog: "${var.catalog}"
              schema_gold: "${var.schema_gold}"

        - task_key: gold_no_delete
          depends_on:
            - task_key: simulate_changes
          environment_key: gold_env
          notebook_task:
            notebook_path: ../pyspark_examples/gold_strategies/gold_no_delete.py
            base_parameters:
              catalog: "${var.catalog}"
              schema_gold: "${var.schema_gold}"

      tags:
        project: "mining_bootstrap"
        environment: "${bundle.target}"
