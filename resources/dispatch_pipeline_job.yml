resources:
  jobs:
    dispatch_pipeline:
      name: "[${bundle.target}] Dispatch Pipeline"
      environments:
        - environment_key: pipeline_env
          spec:
            environment_version: "1"

      tasks:
        - task_key: dispatch_work
          environment_key: pipeline_env
          notebook_task:
            notebook_path: ../pyspark_examples/executor.py
