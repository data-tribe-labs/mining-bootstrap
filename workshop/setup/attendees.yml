# Worley Data Engineering Workshop — attendee roster
#
# Fill this in BEFORE running provision_attendees.py.
# Each attendee gets a Unity Catalog named  {prefix}_{first_name}_{last_name}
# (lowercased, non-alphanumerics collapsed to "_").
#
# Example: "John O'Brien" → worley_john_o_brien

prefix: worley

attendees:
  - first_name: CHANGE_ME
    last_name: CHANGE_ME
    email: changeme@worley.com
